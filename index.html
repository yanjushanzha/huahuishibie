<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>花卉识别系统</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f7f9fc;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .img-box {
            width: 100%;
            height: 350px;
            border: 2px dashed #bdc3c7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #preview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .btn {
            padding: 12px 28px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            cursor: pointer;
            margin: 8px;
        }

        .result {
            margin-top: 25px;
            font-size: 16px;
            text-align: left;
        }

        .result b {
            color: #e74c3c;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>花卉识别系统</h1>
        <div class="img-box">
            <img id="preview" alt="预览">
        </div>

        <input type="file" id="upload" accept="image/*" class="btn" style="background:#95a5a6">
        <button class="btn" onclick="predict()">开始识别</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        // 30种花卉名称
        const classNames = [
            "芙蓉葵","鸡蛋花","金鱼草","蒲公英","牵牛花",
            "石竹","仙客来","一品红","硬叶兜兰","玉兰",
            "月季","白晶菊","波斯菊","大丽花","帝王花",
            "杜鹃","非洲菊","风信子","荷花","鹤望兰",
            "凌霄花","马蹄莲","三角梅","三色堇","水仙",
            "睡莲","向日葵","银莲花","虞美人","鸢尾"
        ];

        let session;
        const resultBox = document.getElementById("result");

        // ==========================================
        // ✅ 关键：模型名称 改成 你真实的 flower_model.onnx
        // ==========================================
        const MODEL_URL = "https://yanjushanzha.github.io/huahuishibie/flower_model.onnx";

        // 配置 ORT 避免浏览器拦截
        ort.env.wasm = {
            wasmPaths: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/",
            proxy: true,
            numThreads: 1
        };
        ort.env.logLevel = "error";

        // 加载模型
        (async () => {
            try {
                resultBox.innerText = "⏳ 正在加载模型，请稍候...";
                session = await ort.InferenceSession.create(MODEL_URL);
                resultBox.innerText = "✅ 模型加载成功！可以上传图片识别";
            } catch (err) {
                resultBox.innerText = "❌ 模型加载失败：" + err.message;
                console.error(err);
            }
        })();

        // 图片预览
        document.getElementById("upload").onchange = function (e) {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const img = document.getElementById("preview");
            img.src = url;
            img.style.display = "block";
        };

        // 开始识别
        async function predict() {
            if (!session) {
                alert("模型未加载完成");
                return;
            }

            const img = document.getElementById("preview");
            if (!img.src) {
                alert("请先上传图片");
                return;
            }

            resultBox.innerText = "⏳ 识别中...";

            // 图像预处理
            const canvas = document.createElement("canvas");
            canvas.width = 224;
            canvas.height = 224;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, 224, 224);
            const data = ctx.getImageData(0, 0, 224, 224).data;

            const mean = [0.485, 0.456, 0.406];
            const std = [0.229, 0.224, 0.225];
            const input = new Float32Array(3 * 224 * 224);

            for (let i = 0; i < 224 * 224; i++) {
                input[i] = (data[i * 4] / 255 - mean[0]) / std[0];
                input[i + 224 * 224] = (data[i * 4 + 1] / 255 - mean[1]) / std[1];
                input[i + 2 * 224 * 224] = (data[i * 4 + 2] / 255 - mean[2]) / std[2];
            }

            const tensor = new ort.Tensor("float32", input, [1, 3, 224, 224]);
            const output = await session.run({ input: tensor });
            const scores = output.output.data;

            // 找最高分
            let maxIdx = 0;
            for (let i = 0; i < scores.length; i++) {
                if (scores[i] > scores[maxIdx]) maxIdx = i;
            }

            resultBox.innerHTML = `<b>识别结果：${classNames[maxIdx]}</b>`;
        }
    </script>
</body>
</html>
