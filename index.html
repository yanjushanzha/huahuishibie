<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>花卉识别系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
        body{background:#f5f7fa;padding:40px 0}
        .container{width:1000px;margin:0 auto}
        h1{text-align:center;margin-bottom:30px;color:#333}
        .box{display:flex;gap:30px;background:white;padding:30px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
        .left{flex:1;display:flex;flex-direction:column;align-items:center}
        #preview-box{width:380px;height:380px;border:2px dashed #ccc;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:15px}
        #preview{max-width:100%;max-height:100%;display:none;border-radius:8px}
        #image-input{padding:6px}
        .right{flex:1;display:flex;flex-direction:column;justify-content:center}
        .result-box{background:#f8f9fa;padding:30px;border-radius:12px;margin-bottom:20px;height:220px}
        .result-box h3{margin-bottom:15px;font-size:18px;color:#444}
        .result-box p{font-size:16px;margin:8px 0}
        button{padding:14px;font-size:16px;border:none;border-radius:8px;cursor:pointer}
        #predict-btn{background:#2f80ed;color:white;margin-bottom:10px}
        #clear-btn{background:#eee;color:#333}
    </style>
</head>
<body>

<div class="container">
    <h1>花卉识别系统（CBAM + 纯前端部署）</h1>
    <div class="box">
        <div class="left">
            <div id="preview-box"><img id="preview"></div>
            <input type="file" id="image-input" accept="image/*">
        </div>
        <div class="right">
            <div class="result-box">
                <h3>识别结果</h3>
                <p id="class-name">等待识别...</p>
                <p id="confidence">置信度：-- %</p>
            </div>
            <button id="predict-btn">开始识别</button>
            <button id="clear-btn">清空</button>
        </div>
    </div>
</div>

<!-- 关键：用稳定版本的CDN，确保脚本加载成功 -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js"></script>
<script>
    let model = null;
    const classNames = [
        '一品红', '三色堇', '三角梅', '仙客来', '凌霄花',
        '向日葵', '大丽花', '帝王花', '月季', '杜鹃',
        '水仙', '波斯菊', '牵牛花', '玉兰', '白晶菊',
        '睡莲', '石竹', '硬叶兜兰', '芙蓉葵', '荷花',
        '蒲公英', '虞美人', '金鱼草', '银莲花', '非洲菊',
        '风信子', '马蹄莲', '鸡蛋花', '鸢尾', '鹤望兰'
    ];

    // 加载模型（加了加载提示）
    (async () => {
        try {
            if (typeof ort === 'undefined') {
                document.getElementById("class-name").innerText = "onnxruntime 加载失败！";
                console.error("❌ ort is undefined, please check CDN link");
                return;
            }
            document.getElementById("class-name").innerText = "模型加载中...";
            model = await ort.InferenceSession.create("./flower_model.onnx");
            document.getElementById("class-name").innerText = "等待识别...";
            console.log("✅ 模型加载成功");
        } catch (e) {
            document.getElementById("class-name").innerText = "模型加载失败！";
            console.error("❌ 模型加载失败：", e);
        }
    })();

    function preprocess(img) {
        if (typeof ort === 'undefined') {
            throw new Error("ort is not defined");
        }
        const canvas = document.createElement("canvas");
        canvas.width = 224;
        canvas.height = 224;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, 224, 224);
        const data = ctx.getImageData(0, 0, 224, 224).data;

        const mean = [0.485, 0.456, 0.406];
        const std  = [0.229, 0.224, 0.225];
        const input = new Float32Array(1 * 3 * 224 * 224);

        for (let i = 0; i < 224 * 224; i++) {
            input[i]                   = (data[i*4+0]/255 - mean[0]) / std[0];
            input[i+224*224]           = (data[i*4+1]/255 - mean[1]) / std[1];
            input[i+224*224*2]         = (data[i*4+2]/255 - mean[2]) / std[2];
        }
        return new ort.Tensor("float32", input, [1, 3, 224, 224]);
    }

    document.getElementById("predict-btn").onclick = async () => {
        const file = document.getElementById("image-input").files[0];
        if (!file) return alert("请选择图片");
        if (!model) return alert("模型还没加载好，请稍等！");

        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = async () => {
            try {
                const tensor = preprocess(img);
                const res = await model.run({ input: tensor });
                const out = res.output.data;

                let maxIdx = 0;
                let maxVal = out[0];
                for (let i = 1; i < out.length; i++) {
                    if (out[i] > maxVal) { maxVal = out[i]; maxIdx = i; }
                }

                // 稳定版 softmax 计算
                const maxValSafe = Math.max(...out);
                let sumExp = 0;
                const expScores = out.map(v => Math.exp(v - maxValSafe));
                expScores.forEach(v => sumExp += v);
                const prob = expScores[maxIdx] / sumExp;

                document.getElementById("class-name").innerText = "类别：" + classNames[maxIdx];
                document.getElementById("confidence").innerText = "置信度：" + (prob*100).toFixed(2)+"%";
            } catch (e) {
                console.error("识别出错：", e);
                alert("识别出错了，请检查模型文件！");
            }
        };
    };

    document.getElementById("image-input").onchange = e => {
        const prev = document.getElementById("preview");
        prev.src = URL.createObjectURL(e.target.files[0]);
        prev.style.display = "block";
    };

    document.getElementById("clear-btn").onclick = () => {
        document.getElementById("image-input").value = "";
        document.getElementById("preview").style.display = "none";
        document.getElementById("class-name").innerText = "等待识别...";
        document.getElementById("confidence").innerText = "置信度：-- %";
    };
</script>
</body>
</html>
