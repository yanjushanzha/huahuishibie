<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>花卉识别</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js"></script>
    <style>
        body{padding:30px;display:flex;flex-direction:column;align-items:center}
        .img-box{width:100%;height:350px;border:2px dashed #ccc;margin:20px 0;display:flex;align-items:center;justify-content:center}
        #preview{max-height:100%;display:none}
        .btn{padding:10px 20px;margin:5px}
        .result{margin-top:20px;font-size:18px}
    </style>
</head>
<body>
    <h1>花卉识别系统</h1>
    <div class="img-box"><img id="preview"></div>
    <input type="file" id="upload" class="btn" accept="image/*">
    <button class="btn" onclick="predict()">开始识别</button>
    <div class="result" id="result"></div>

<script>
const classNames = ["芙蓉葵","鸡蛋花","金鱼草","蒲公英","牵牛花","石竹","仙客来","一品红","硬叶兜兰","玉兰","月季","白晶菊","波斯菊","大丽花","帝王花","杜鹃","非洲菊","风信子","荷花","鹤望兰","凌霄花","马蹄莲","三角梅","三色堇","水仙","睡莲","向日葵","银莲花","虞美人","鸢尾"];
let session;

ort.env.wasm = { wasmPaths:"https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/", proxy:true, numThreads:1 };

(async ()=>{
    try {
        session = await ort.InferenceSession.create("https://yanjushanzha.github.io/huahuishibie/flower_model.onnx");
        document.getElementById("result").innerText = "✅ 模型加载成功！";
    }catch(e){
        document.getElementById("result").innerText = "❌ 模型加载失败："+e.message;
    }
})();

document.getElementById("upload").onchange = e=>{
    const url = URL.createObjectURL(e.target.files[0]);
    document.getElementById("preview").src = url;
    document.getElementById("preview").style.display = "block";
};

async function predict(){
    const img = new Image();
    img.src = document.getElementById("preview").src;
    img.onload = async ()=>{
        const canvas = document.createElement("canvas");
        canvas.width=224; canvas.height=224;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,224,224);
        const data=ctx.getImageData(0,0,224,224).data;

        const arr=new Float32Array(3*224*224);
        const mean=[0.485,0.456,0.406],std=[0.229,0.224,0.225];
        for(let i=0;i<224*224;i++){
            arr[i]=(data[i*4]/255-mean[0])/std[0];
            arr[i+224*224]=(data[i*4+1]/255-mean[1])/std[1];
            arr[i+2*224*224]=(data[i*4+2]/255-mean[2])/std[2];
        }
        const tensor=new ort.Tensor("float32",arr,[1,3,224,224]);
        const res=await session.run({input:tensor});
        const scores=res.output.data;

        let maxIdx=0;
        for(let i=0;i<scores.length;i++) if(scores[i]>scores[maxIdx]) maxIdx=i;
        document.getElementById("result").innerText = "识别结果："+classNames[maxIdx];
    };
}
</script>
</body>
</html>
