<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花卉识别系统</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f7f9fc;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .img-box {
            width: 100%;
            height: 350px;
            border: 2px dashed #bdc3c7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #preview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .btn {
            padding: 12px 28px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            margin: 8px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .result {
            margin-top: 25px;
            text-align: left;
            font-size: 16px;
            line-height: 1.7;
        }

        .result b {
            color: #e74c3c;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>花卉识别系统</h1>
        <div class="img-box">
            <img id="preview" alt="预览图">
        </div>

        <input type="file" id="upload" accept="image/*" class="btn" style="background-color:#95a5a6">
        <button class="btn" onclick="predict()">开始识别</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        const classNames = [
            "芙蓉葵","鸡蛋花","金鱼草","蒲公英","牵牛花",
            "石竹","仙客来","一品红","硬叶兜兰","玉兰",
            "月季","白晶菊","波斯菊","大丽花","帝王花",
            "杜鹃","非洲菊","风信子","荷花","鹤望兰",
            "凌霄花","马蹄莲","三角梅","三色堇","水仙",
            "睡莲","向日葵","银莲花","虞美人","鸢尾"
        ];

        let session;
        const preview = document.getElementById('preview');
        const resultBox = document.getElementById('result');

        // 配置跨域 + 正确路径（GitHub Pages 100% 可用）
        ort.env.wasm = {
            proxy: true,
            numThreads: 4
        };
        ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/";

        // 加载模型（修复路径 + 跨域）
        (async () => {
    try {
        // 直接写死你自己的CDN地址，避免任何相对路径问题
        const modelUrl = "https://yanjushanzha.github.io/huahuishibie/flower_model.onnx";
        console.log("正在加载模型：", modelUrl);
        session = await ort.InferenceSession.create(modelUrl);
        console.log("✅ 模型加载成功");
        resultBox.innerHTML = "✅ 模型已就绪，可上传图片识别";
    } catch (e) {
        // 把完整错误信息显示在页面上，方便排查
        console.error("❌ 模型加载失败", e);
        resultBox.innerHTML = `❌ 模型加载失败<br>错误详情：${e.message}<br>请检查模型文件是否正常`;
    }
})();

        // 图片预览
        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            preview.src = url;
            preview.style.display = 'block';
            resultBox.innerHTML = '';
        });

        // 识别
        async function predict() {
            if (!preview.src || preview.style.display === 'none') {
                alert("请先上传图片！");
                return;
            }

            if (!session) {
                alert("模型尚未加载完成，请稍候再试");
                return;
            }

            resultBox.innerHTML = "⏳ 识别中，请稍候...";

            const img = new Image();
            img.src = preview.src;
            img.crossOrigin = "anonymous";
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                canvas.width = 224;
                canvas.height = 224;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 224, 224);

                const data = ctx.getImageData(0, 0, 224, 224).data;
                const input = await preprocess(data);

                const feeds = { input: input };
                const output = await session.run(feeds);
                const res = output.output.data;

                showResult(res);
            };
        }

        // 预处理
        function preprocess(data) {
            const arr = new Float32Array(3 * 224 * 224);
            const mean = [0.485, 0.456, 0.406];
            const std = [0.229, 0.224, 0.225];

            for (let i = 0; i < 224 * 224; i++) {
                arr[i] = data[i * 4] / 255;
                arr[i] = (arr[i] - mean[0]) / std[0];

                arr[i + 224 * 224] = data[i * 4 + 1] / 255;
                arr[i + 224 * 224] = (arr[i + 224 * 224] - mean[1]) / std[1];

                arr[i + 2 * 224 * 224] = data[i * 4 + 2] / 255;
                arr[i + 2 * 224 * 224] = (arr[i + 2 * 224 * 224] - mean[2]) / std[2];
            }

            return new ort.Tensor('float32', arr, [1, 3, 224, 224]);
        }

        // 显示结果
        function showResult(scores) {
            let maxIdx = 0;
            let maxScore = 0;

            for (let i = 0; i < scores.length; i++) {
                if (scores[i] > maxScore) {
                    maxScore = scores[i];
                    maxIdx = i;
                }
            }

            const expScores = scores.map(s => Math.exp(s));
            const total = expScores.reduce((a, b) => a + b, 0);
            const percent = (expScores[maxIdx] / total * 100).toFixed(2);

            resultBox.innerHTML = `<b>识别结果：${classNames[maxIdx]}</b><br>置信度：${percent}%`;
        }
    </script>
</body>
</html>
